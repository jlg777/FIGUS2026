    .tab-button.inactive {

  <script>
    let figuritas = [];

    const grid = document.getElementById("grid");
    const buscador = document.getElementById("buscador");
    const contador = document.getElementById("contador");

    function mostrar(lista) {
      grid.innerHTML = "";

      lista.forEach((numero) => {
        const div = document.createElement("div");
        div.className = "figurita";
        div.textContent = numero;
        grid.appendChild(div);
      });

      // Actualizar contador
      if (buscador.value.trim() !== "") {
        contador.textContent = `Mostrando ${lista.length} de ${figuritas.length} figuritas`;
      } else {
        contador.textContent = `Total: ${figuritas.length} figuritas`;
      }
    }

    // Cargar figuritas desde el archivo JSON
    fetch("figuritas1.json")
      .then(response => response.json())
      .then(data => {
        figuritas = data;
        mostrar(figuritas);
      })
      .catch(error => {
        console.error("Error al cargar las figuritas:", error);
        grid.innerHTML = "<div style='grid-column: 1 / -1; text-align: center; color: red;'>No se pudieron cargar las figuritas.</div>";
        contador.textContent = "Error al cargar";
      });

    buscador.addEventListener("input", () => {
      const texto = buscador.value.trim();

      const filtradas = figuritas.filter((n) => n.toString().includes(texto));

      mostrar(filtradas);
    });
  </script>
