<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figuritas Faltantes - Mundial 2026</title>

    <style>
      :root {
        color-scheme: light;
      }

      body {
        font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
        max-width: 1000px;
        margin: 20px auto;
        padding: 20px;
        min-height: 100vh;
        background: linear-gradient(180deg, #f8fafc 0%, #eef8f0 100%);
        color: #0f172a;
        box-sizing: border-box;
      }

      .banner {
        width: min(100%, 168px);
        margin: 0 auto 24px;
        border-radius: 16px;
        overflow: hidden;
      }

      .banner img {
        width: 100%;
        display: block;
        opacity: 0.85;
      }

      h1 {
        text-align: center;
        font-size: clamp(1.35rem, 4.2vw, 2rem);
        margin-bottom: 16px;
        letter-spacing: -0.02em;
      }

      .search-shell {
        margin-bottom: 14px;
      }

      #buscador {
        width: 100%;
        padding: 14px 16px;
        font-size: 16px;
        box-sizing: border-box;
        border: 1px solid #d8e8dc;
        border-radius: 999px;
        background: #ffffff;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
      }

      #buscador:focus {
        outline: none;
        border-color: #4caf50;
        box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.16);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
        gap: 10px;
      }

      .figurita {
        background: linear-gradient(135deg, #ffffff 0%, #f0fdf4 100%);
        border: 1px solid #c8e6c9;
        border-radius: 14px;
        padding: 14px 10px;
        text-align: center;
        font-weight: 700;
        color: #166534;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
      }

      .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 24px 16px;
        border: 1px dashed #cbd5e1;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.85);
        color: #64748b;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
      }

      .whatsapp-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 54px;
        height: 54px;
        margin: 32px auto 8px;
        background: #25d366;
        border-radius: 50%;
        text-decoration: none;
        box-shadow: 0 10px 18px rgba(37, 211, 102, 0.24);
        transition:
          transform 200ms ease,
          box-shadow 200ms ease;
      }

      .whatsapp-link:hover {
        animation: whatsapp-pulse 1s infinite;
        transform: scale(1.05);
        box-shadow: 0 14px 24px rgba(37, 211, 102, 0.28);
      }

      .whatsapp-link svg {
        width: 26px;
        height: 26px;
        fill: white;
      }

      .whatsapp-label {
        display: block;
        text-align: center;
        color: #111827;
        font-size: 0.95rem;
        margin: 0 auto;
        max-width: 200px;
        line-height: 1.3;
      }

      @keyframes whatsapp-pulse {
        0% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.08);
        }

        100% {
          transform: scale(1);
        }
      }

      .tabs-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-bottom: 24px;
      }

      .tab-button {
        padding: 10px 20px;
        font-size: 16px;
        font-weight: bold;
        border: 2px solid #4caf50;
        border-radius: 24px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s ease;
      }

      .tab-button.active {
        background-color: #4caf50;
        color: white;
        box-shadow: 0 4px 12px rgba(76, 175, 80, 0.24);
      }

      .tab-button.inactive {
        background-color: white;
        color: #4caf50;
      }

      .tab-button.inactive:hover {
        background-color: #e8f5e9;
        transform: translateY(-1px);
        box-shadow: 0 2px 8px rgba(76, 175, 80, 0.15);
      }

      .contador {
        font-size: 15px;
        color: #475569;
        margin: 0 auto 12px auto;
        font-weight: 600;
        text-align: center;
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid #dbeafe;
        padding: 8px 16px;
        border-radius: 999px;
        width: fit-content;
        display: block;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
      }

      .progreso-shell {
        max-width: 560px;
        margin: 0 auto 18px;
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid #dbeafe;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.05);
      }

      .progreso-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
        font-size: 0.95rem;
        color: #334155;
        font-weight: 700;
      }

      .progreso-track {
        width: 100%;
        height: 12px;
        background: #e2e8f0;
        border-radius: 999px;
        overflow: hidden;
      }

      .progreso-fill {
        height: 100%;
        width: 0%;
        border-radius: inherit;
        background: linear-gradient(
          90deg,
          #ef4444 0%,
          #f59e0b 55%,
          #22c55e 100%
        );
        transition: width 240ms ease;
      }

      .progreso-texto {
        margin-top: 8px;
        font-size: 0.92rem;
        color: #475569;
        text-align: center;
      }

      @media (max-width: 480px) {
        body {
          padding: 12px;
          margin: 8px auto;
        }

        .banner {
          width: min(100%, 140px);
          margin-bottom: 16px;
        }

        h1 {
          font-size: 1.3rem;
          margin-bottom: 12px;
        }

        .tabs-container {
          flex-direction: column;
          gap: 10px;
        }

        .tab-button {
          width: 100%;
          text-align: center;
          padding: 10px 16px;
          border-radius: 16px;
        }

        #buscador {
          padding: 13px 15px;
        }

        .grid {
          grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
          gap: 8px;
        }

        .figurita {
          padding: 10px 6px;
          font-size: 0.9rem;
          border-radius: 12px;
        }
      }
    </style>
  </head>

  <body>
    <h1>Figuritas Faltantes - Mundial 2026</h1>

    <div class="banner">
      <img src="album.webp" alt="Álbum Mundial 2026" />
    </div>

    <div class="tabs-container">
      <a href="index.html" class="tab-button active">Faltantes</a>
      <a href="index1.html" class="tab-button inactive">Repetidas</a>
    </div>

    <div class="search-shell">
      <input
        type="tel"
        id="buscador"
        inputmode="numeric"
        pattern="[0-9]*"
        autocomplete="off"
        enterkeyhint="done"
        placeholder="Buscar figurita..."
      />
    </div>

    <div id="contador" class="contador">Cargando...</div>

    <div class="progreso-shell" aria-label="Progreso del álbum">
      <div class="progreso-meta">
        <span>Progreso del álbum</span>
        <span id="progreso-porcentaje">0%</span>
      </div>
      <div class="progreso-track">
        <div id="progreso-fill" class="progreso-fill"></div>
      </div>
      <div id="progreso-texto" class="progreso-texto">Cargando progreso...</div>
    </div>

    <div id="grid" class="grid"></div>

    <script>
      let figuritas = [];

      const grid = document.getElementById("grid");
      const buscador = document.getElementById("buscador");
      const contador = document.getElementById("contador");
      const progresoFill = document.getElementById("progreso-fill");
      const progresoPorcentaje = document.getElementById("progreso-porcentaje");
      const progresoTexto = document.getElementById("progreso-texto");
      const totalAlbum = 450;

      function actualizarProgreso() {
        const faltantes = figuritas.length;
        const completadas = Math.max(0, totalAlbum - faltantes);
        const porcentaje = Math.min(
          100,
          Math.max(0, Math.round((completadas / totalAlbum) * 100)),
        );
        const faltan = totalAlbum - completadas;

        progresoFill.style.width = `${porcentaje}%`;
        progresoPorcentaje.textContent = `${porcentaje}%`;
        progresoTexto.textContent = `Completaste ${completadas}/${totalAlbum} figuritas · Faltan ${faltan}`;
      }

      function mostrar(lista) {
        grid.innerHTML = "";

        if (lista.length === 0) {
          const vacio = document.createElement("div");
          vacio.className = "empty-state";
          vacio.textContent = "No se encontraron figuritas con ese número.";
          grid.appendChild(vacio);
        } else {
          lista.forEach((numero) => {
            const div = document.createElement("div");
            div.className = "figurita";
            div.textContent = numero;
            grid.appendChild(div);
          });
        }

        if (buscador.value.trim() !== "") {
          contador.textContent = `Mostrando ${lista.length} de ${figuritas.length} figuritas`;
        } else {
          contador.textContent = `Total: ${figuritas.length} figuritas`;
        }
      }

      // Cargar figuritas desde el archivo JSON
      fetch("figuritas.json")
        .then((response) => response.json())
        .then((data) => {
          figuritas = data;
          actualizarProgreso();
          mostrar(figuritas);
        })
        .catch((error) => {
          console.error("Error al cargar las figuritas:", error);
          grid.innerHTML =
            "<div style='grid-column: 1 / -1; text-align: center; color: red;'>No se pudieron cargar las figuritas.</div>";
          contador.textContent = "Error al cargar";
          progresoFill.style.width = "0%";
          progresoPorcentaje.textContent = "0%";
          progresoTexto.textContent =
            "No se pudo cargar el progreso del álbum.";
        });

      buscador.addEventListener("input", () => {
        const texto = buscador.value.replace(/\D/g, "").trim();

        buscador.value = texto;

        const filtradas = figuritas.filter((n) => n.toString().includes(texto));

        mostrar(filtradas);
      });
    </script>
  </body>
